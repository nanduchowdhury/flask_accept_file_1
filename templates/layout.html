<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>{% block title %}bluepayload - minimalist approach towards many things{% endblock %}</title>

    <!-- favicon - generated thru site : https://favicon.io/favicon-generator/ -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="/static/images/favicon/site.webmanifest">
 
    <!-- SEO Meta Tags -->
    {% block meta %}
    <meta name="description" content="bluepayload provides minimalist approach towards many things - learning">
    <meta name="keywords" content="bluepayload, minimalist, stocks, learning platform, education, knowledge, online learning">
    {% endblock %}
    <meta name="robots" content="index, follow">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="bluepayload - minimalist approach towards many things">
    <meta property="og:description" content="A platform to explore knowledge and learning resources.">
    <meta property="og:image" content="https://cdn.jsdelivr.net/gh/nanduchowdhury/flask_accept_file_1@main/static/images/bluepayload-logo.png">
    <meta property="og:url" content="https://bluepayload.com/">
    <meta property="og:type" content="website">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="bluepayload - minimalist approach towards many things">
    <meta name="twitter:description" content="Discover, learn, and explore diverse knowledge.">
    <meta name="twitter:image" content="https://cdn.jsdelivr.net/gh/nanduchowdhury/flask_accept_file_1@main/static/images/bluepayload-logo.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet" media="print" onload="this.media='all'" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" media="print" onload="this.media='all'" crossorigin="anonymous">

    <!-- Custom Styles - Defer Non-Critical -->
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='buttonCombination.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='MessageBox.css') }}">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            max-width: 100vw;
            box-sizing: border-box;
        }
        .welcome-heading .line-1 { color: #161cca; }
        .welcome-heading .line-2 { color: #121315; }
        .welcome-heading .line-3 { color: #121315; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="header-container">
        <div class="header-main-row">
            <a href="https://bluepayload.com/" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/nanduchowdhury/flask_accept_file_1@main/static/images/bluepayload-logo.png"
                     class="logo" alt="bluepayload Logo" title="bluepayload - minimalist approach towards many things"
                     width="150" height="50" loading="lazy">
            </a>
            <div class="center-container">
                <a
                    id="joinWhatsappBtn"
                    href="https://chat.whatsapp.com/FLB3g8Ma2m9838z9a6imBw"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="whatsapp-btn">
    
                    <i class="fab fa-whatsapp"></i>
                    Join WhatsApp Community
    
                </a>
            </div>
        </div>

        <hr class="banner-separator">
        <div id="rotatingBannerContainer" class="banner-container">
            <div id="rotatingBannerContent" class="banner-content"></div>
        </div>
        <hr class="banner-separator">
    </header>

    <main class="home-area-container">
        {% block main_content %}{% endblock %}
        
        <aside id="SocialArea" class="social-area">
            <div class="left-links">
                <a href="/home/sitemap" style="position: absolute; left: -9999px;">Sitemap</a>
                <a href="/home/about">About</a>
                <a href="/home/contact">Contact</a>
                <a href="/home/privacy">Privacy Policy</a>
                <a href="/home/terms">Terms of Service</a>
                <a href="/home/disclaimer">Disclaimer</a>
            </div>
            <div class="social-links">
                <a href="https://x.com/nandu_chowdhury" target="_blank" class="social-icon" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="https://www.linkedin.com/company/bluepayload/?viewAsMember=true" target="_blank" class="social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="mailto:contact@bluepayload.com?subject=kupmanduk%20website%20user" class="social-icon" aria-label="Email"><i class="fas fa-envelope"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61590854792110" target="_blank" class="social-icon" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://www.youtube.com/@bluepayload" target="_blank" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            </div>
        </aside>
    </main>

    <div id="messageBox" class="message-box hidden">
        <span id="messageBoxText"></span>
        <button id="messageBoxOkButton">OK</button>
    </div>
    <div id="genericPopoutId" class="genericPopout"></div>

    <script src="https://js.sentry-cdn.com/423dcf7111b0930c274bbf13cef242ce.min.js" crossorigin="anonymous"></script>
    <script>
    Sentry.init({ 
        dsn: "https://423dcf7111b0930c274bbf13cef242ce@o4511743436652544.ingest.us.sentry.io/4511743457820672", 
        environment: "production", 
        integrations: [
            
        ],
        tracesSampleRate: 1.0 
    });
    {% block script_init %}{% endblock %}
    </script>

    <script defer src="{{ url_for('static', filename='BasicInitializer.js') }}" crossorigin="anonymous"></script>
    <script defer src="{{ url_for('static', filename='whatsappTracker.js') }}" crossorigin="anonymous"></script>
    <script defer src="{{ url_for('static', filename='ManageRotatingBanner.js') }}" crossorigin="anonymous"></script>
    <script defer src="{{ url_for('static', filename='home_render.js') }}" crossorigin="anonymous"></script>
    <script defer src="{{ url_for('static', filename='errorManager.js') }}" crossorigin="anonymous"></script>
    <script defer src="{{ url_for('static', filename='geologicalInfo.js') }}" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='ContainerScrollBarControl.js') }}" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='popoutManager.js') }}" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='stock_analysis.js') }}" crossorigin="anonymous"></script>
    {% block extra_scripts %}{% endblock %}

    <script>
        if (window !== window.top) { document.body.style.overflow = "auto"; document.documentElement.style.overflow = "auto"; }
        document.addEventListener("DOMContentLoaded", function () {
            setTimeout(() => {
                const scriptGA = document.createElement("script"); 
                scriptGA.async = true; 
                scriptGA.crossOrigin = "anonymous";
                scriptGA.src = "https://www.googletagmanager.com/gtag/js?id=G-4NLLJX710S"; 
                document.head.appendChild(scriptGA);
                const scriptClarity = document.createElement("script"); scriptClarity.innerHTML = `(function(c,l,a,r,i,t,y){ c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)}; t=l.createElement(r);t.async=1;t.crossOrigin="anonymous";t.src="https://www.clarity.ms/tag/"+i; y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y); })(window, document, "clarity", "script", "qqnxtjq93c");`; document.body.appendChild(scriptClarity);
            }, 2000);
            
            const tracker = new WhatsAppTracker();
            tracker.trackUserInteraction();

            // Initialize and display the rotating banner
            const banner = new ManageRotatingBanner('rotatingBannerContainer', 'rotatingBannerContent');
            banner.init("{{ url_for('static', filename='prompts/all_sector_summary.json') }}");

            {% block dom_ready %}{% endblock %}
        });
        {% block extra_js %}{% endblock %}
    </script>
</body>
</html>
